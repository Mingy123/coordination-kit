targets:
  - esp32s3
  - esp32c6
dependencies:
  idf:
    version: ">=5.0"
  espressif/esp32-camera:
    version: "^2.0.15"
    rules:
      - if: "target == esp32s3"
  espressif/usb_device_uvc:
    version: "^1.3"
    rules:
      - if: "target == esp32s3"
  cmake_utilities:
    version: "*"
    rules:
      - if: "target == esp32s3"
